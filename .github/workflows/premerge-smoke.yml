name: Pre-merge Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  canary:
    name: Canary (fast mocked checks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest pytest-httpserver

      - name: Run canary tests (mock-only)
        run: |
          python -m pytest -q \
            tests/test_e2e_mocked_ci_collect_and_app.py \
            tests/test_property_parsers_and_webhook.py \
            tests/test_notifications_grouping.py \
            tests/test_trends_history_summary.py

  smoke:
    name: Smoke Regression (mock-only)
    runs-on: ubuntu-latest
    needs: canary
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest pytest-httpserver

      - name: Run smoke suite (no external CI/containers)
        run: |
          python -m pytest -q \
            tests/test_auth_and_config.py \
            tests/test_clients.py \
            tests/test_contracts.py \
            tests/test_e2e_mocked_ci_collect_and_app.py \
            tests/test_filters_frontend_contracts.py \
            tests/test_notifications_grouping.py \
            tests/test_parsers.py \
            tests/test_property_parsers_and_webhook.py \
            tests/test_snapshot_trends_cache.py \
            tests/test_trends_history_summary.py \
            tests/test_web_services_utils.py
