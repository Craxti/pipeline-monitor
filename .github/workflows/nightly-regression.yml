name: Nightly Regression

on:
  schedule:
    - cron: "20 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  regression:
    name: Nightly mock regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest pytest-httpserver

      - name: Run nightly suite (mock-only) with JUnit
        run: |
          python -m pytest -q \
            tests/test_auth_and_config.py \
            tests/test_clients.py \
            tests/test_contracts.py \
            tests/test_e2e_mocked_ci_collect_and_app.py \
            tests/test_filters_frontend_contracts.py \
            tests/test_notifications_grouping.py \
            tests/test_parsers.py \
            tests/test_property_parsers_and_webhook.py \
            tests/test_snapshot_trends_cache.py \
            tests/test_trends_history_summary.py \
            tests/test_web_services_utils.py \
            --junitxml=nightly-junit.xml

      - name: Parse JUnit summary
        if: always()
        id: junit
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          import os
          path = "nightly-junit.xml"
          tests = failures = errors = skipped = 0
          if os.path.exists(path):
              root = ET.parse(path).getroot()
              tests = int(root.attrib.get("tests", 0))
              failures = int(root.attrib.get("failures", 0))
              errors = int(root.attrib.get("errors", 0))
              skipped = int(root.attrib.get("skipped", 0))
          total_bad = failures + errors
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"tests={tests}\n")
              fh.write(f"failures={failures}\n")
              fh.write(f"errors={errors}\n")
              fh.write(f"skipped={skipped}\n")
              fh.write(f"total_bad={total_bad}\n")
          print(f"tests={tests} failures={failures} errors={errors} skipped={skipped}")
          PY

      - name: Upload nightly JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-junit
          path: nightly-junit.xml

      - name: Create alert issue on regression growth
        if: always() && steps.junit.outputs.total_bad != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const totalBad = Number("${{ steps.junit.outputs.total_bad }}");
            const failures = Number("${{ steps.junit.outputs.failures }}");
            const errors = Number("${{ steps.junit.outputs.errors }}");
            const title = `[Nightly Regression] Test failures detected (${totalBad})`;
            const body = [
              "Nightly mocked regression detected failing tests.",
              "",
              `- failures: ${failures}`,
              `- errors: ${errors}`,
              `- workflow: ${context.workflow}`,
              `- run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Please triage before merging risky changes."
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["bug", "ci", "nightly-regression"]
            });
