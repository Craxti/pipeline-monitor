name: black

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install black
        run: python -m pip install --upgrade pip black

      - name: Check formatting
        run: black --check .

