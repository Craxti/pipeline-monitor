services:
  pipeline-monitor-web:
    build: .
    image: pipeline-monitor-web:local
    container_name: pipeline-monitor-web
    restart: unless-stopped
    ports:
      - "8020:8020"
    environment:
      # App config and DB live under CICD_MON_DATA_DIR (/app/data in the image)
      CICD_MON_DATA_DIR: /app/data
      # Optional shared token for protected endpoints:
      # CICD_MON_API_TOKEN: "change-me"
      PYTHONUNBUFFERED: "1"
    volumes:
      - pipeline-monitor-data:/app/data
      # Allow in-container docker_monitor to query host Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8020/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  pipeline-monitor-data:

