function currentLang() {
  const s = localStorage.getItem('cimon-ui-lang');
  if (s === 'ru' || s === 'en') return s;
  return window.__UI_LANG_DEFAULT__ === 'ru' ? 'ru' : 'en';
}

function t(key) {
  const parts = key.split('.');
  const walk = (root) => {
    let o = root;
    for (const p of parts) { o = o && o[p]; }
    return typeof o === 'string' ? o : null;
  };
  return walk(I18N[currentLang()] || I18N.en) || walk(I18N.en) || key;
}

function tf(key, vars) {
  let s = t(key);
  if (!vars) return s;
  Object.keys(vars).forEach((k) => {
    s = s.split('{{' + k + '}}').join(String(vars[k]));
  });
  return s;
}

function applyUITexts() {
  document.documentElement.lang = currentLang();
  document.querySelectorAll('[data-i18n]').forEach((el) => {
    const k = el.getAttribute('data-i18n');
    if (k) el.textContent = t(k);
  });
  document.querySelectorAll('[data-i18n-title]').forEach((el) => {
    const k = el.getAttribute('data-i18n-title');
    if (k) el.setAttribute('title', t(k));
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach((el) => {
    const k = el.getAttribute('data-i18n-placeholder');
    if (k) el.setAttribute('placeholder', t(k));
  });
  document.querySelectorAll('[data-i18n-html]').forEach((el) => {
    const k = el.getAttribute('data-i18n-html');
    if (k) el.innerHTML = t(k);
  });
  document.querySelectorAll('[data-i18n-aria-label]').forEach((el) => {
    const k = el.getAttribute('data-i18n-aria-label');
    if (k) el.setAttribute('aria-label', t(k));
  });
  document.querySelectorAll('.lang-toggle button').forEach((b) => {
    b.classList.toggle('active', b.dataset.lang === currentLang());
  });
  const pg = document.body && document.body.getAttribute('data-page');
  document.title = pg === 'settings' ? t('st.doc_title') : t('dash.page_title');
}
